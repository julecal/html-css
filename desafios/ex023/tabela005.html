<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios de Tabelas</title>
    <style>
        th, td {
            border: 1px solid black;
            padding: 8px;

            .destaque {
                background-color: chartreuse;
            }
        }

        col.nome {
            background-color: chartreuse;
        }

        col.sexo, col.cidade {
            background-color: yellow;
        }
    </style>
</head>
<body>
    <table>
        <colgroup>
        <col class="cnome"></colgroup>
        <col class="cgrupo" span="2"></colgroup>
        <col class="cidade"></colgroup>
        <col class="cprof"></colgroup>

        <caption>Cadastro</caption>
        <tr>
        <th scope="col">Nome</th>
        <th scope="col">Sexo</th>
        <th scope="col">Idade</th>
        <th scope="col">Profissão</th>
        </tr>
        <tr>
            <td>Ana Maria</td>
            <td>F</td>
            <td>25</td>
            <td>Jornalista</td>
        </tr>
         <tr>
            <td>João</td>
            <td>F</td>
            <td>25</td>
            <td>Jornalista</td>
        </tr>
         <tr>
            <td>Luciana</td>
            <td>F</td>
            <td>27</td>
            <td>Médica</td>
        </tr>
         <tr>
            <td>Flavio</td>
            <td>M</td>
            <td>29</td>
            <td>Padeiro</td>
        </tr>
         <tr>
            <td>Luciano</td>
            <td>M</td>
            <td>27</td>
            <td>Jornalista</td>
        </tr>
    </table>
</body> 
</html>
