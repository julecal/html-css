<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo de formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <p>
            <label for="inum">Número:</label>
            <input type="range" name="num" id="inum" min="10" max="10" value="5" oninput="ival.innerHTML=Number(inum.vaue)">
            <output name="val" id="ival"></output>
        </p>
    </form>
</body>
</html>
