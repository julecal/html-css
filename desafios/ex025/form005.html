<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de formulário</title>
</head>
<body>
    <h1>Exemplo de formulário</h1>
    <fieldset>
        <legend>Sexo</legend>
        <label for=""><input type="radio" name="sexo" id="isxmas" value="M">Masculino</label><br>
        <label for=""><input type="radio" name="sexo" checked id="isxfem" value="F">Femenino</label><br> 
        
    </fieldset>
    <fieldset>
        <legend>Esportes favoritos</legend>
        <input type="checkbox" name="esft" id="iesfut"> <label for="iesfut">Futebol</label> <br>
        <input type="checkbox" name="esft" id="iesbas"> <label for="iesbas"></label>Basquete</label> <br>
        <input type="checkbox" name="esft" checked id="iesvole"> <label for="iesvole">Vôlei</label> <br>
        <input type="checkbox" name="esft" id="iesnat"> <label for="iesnat">Natação</label> <br>
    </fieldset>

    <p>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </p>
</body>
</html>
